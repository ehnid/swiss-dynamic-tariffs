name: Publish HACS release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Package and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Verify tag matches integration version
        shell: bash
        run: |
          version=$(python -c 'import json; print(json.load(open("custom_components/swiss_dynamic_tariffs/manifest.json"))["version"])')
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Build HACS archive
        shell: bash
        run: |
          cd custom_components/swiss_dynamic_tariffs
          zip -r "${GITHUB_WORKSPACE}/swiss_dynamic_tariffs.zip" .

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          swiss_dynamic_tariffs.zip
          --generate-notes
          --title "${GITHUB_REF_NAME}"
          --verify-tag
