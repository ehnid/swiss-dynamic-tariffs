name: Manage labels

on:
  push:
    branches:
      - main
      - master

permissions:
  issues: write

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.1

      - name: Run Labeler
        uses: crazy-max/ghaction-github-labeler@v6.0.0
        with:
          skip-delete: true
